# --- BACKGROUND ---
background {
    monitor =
#   path = $HOME/Изображения/Wallpapers/21.png
    path = screenshot
    blur_passes = 4
    blur_size = 2
    contrast = 0.8
    brightness = 0.75
    vignette = 0.5
    vignette_opacity = 0.3
    crossfade_time = 0.5
}

# --- VERTICAL CLOCK (UPPER - HOUR) ---
label {
    monitor =
    text = cmd[update:2000] date +%H
    color = rgba(255, 255, 255, 0.9)
    font_size = 80
    font_family = JetBrains Mono Nerd Font ExtraBold
    position = 0, 230
    halign = center
    valign = center
}

# --- VERTICAL CLOCK (LOWER - MINUTE) ---
label {
    monitor =
    text = cmd[update:2000] date +%M
    color = rgba(255, 255, 255, 0.9)
    font_size = 80
    font_family = JetBrains Mono Nerd Font ExtraBold
    position = 0, 115
    halign = center
    valign = center
}

# --- DATE ---
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgba(255, 255, 255, 0.6)
    font_size = 13
    font_family = JetBrains Mono Nerd Font
    position = 0, 35
    halign = center
    valign = center
}

# --- PROFILE IMAGE ---
image {
    monitor =
   
    path = $HOME/face.png
        
    size = 130
    rounding = -1
    border_size = 4
    border_color = rgb(0, 0, 0)
    position = 0, 160
    halign = center
    valign = bottom
}

# --- INPUT FIELD ---
input-field {
    monitor =
    size = 210, 40
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.2)
    inner_color = rgba(0, 0, 0, 0.3)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    placeholder_text = <span foreground="##ffffff99">Password...</span>
    # dots_text_format = *
    # hide_input = true
    position = 0, 100
    halign = center
    valign = bottom
}

label {
    monitor =
    text = $LAYOUT[en,ru]
    font_size = 12
    font_family = JetBrains Mono Nerd Font
    color = rgb(200, 200, 200)
    onclick = hyprctl switchxkblayout all next

    position = 120, 110
    halign = center
    valign = bottom
}

general {
    no_fade_in = false
    grace = 0
    disable_loading = true
    hide_cursor = true
    ignore_empty_input = true
}
