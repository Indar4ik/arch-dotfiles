# * 🌌 L€yzS Ricing - Advanced Lockscreen Configuration 🌌
# 🔐  Vertical Clock Design & Profile Image Integration.

# --- 🎨 COLOR DYNAMICS (PYWAL) ---
# [EN] Connects colors via Pywal
source = $HOME/.cache/wal/colors.hyprland

# --- 🖼️ BACKGROUND ---
background {
    monitor =
    path = $HOME/.cache/current_wallpaper.png
    blur_passes = 3
    contrast = 0.8
    brightness = 0.5
    vignette = 0.5
    vignette_opacity = 0.3
    crossfade_time = 0.5
}

# --- 🕒 VERTICAL CLOCK (UPPER - HOUR) ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H")"
    color = rgba(255, 255, 255, 0.9)
    font_size = 80
    font_family = JetBrains Mono Nerd Font ExtraBold
    position = 0, 230
    halign = center
    valign = center
}

# --- 🕒 VERTICAL CLOCK (LOWER - MINUTE) ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%M")"
    color = rgba(255, 255, 255, 0.9)
    font_size = 80
    font_family = JetBrains Mono Nerd Font ExtraBold
    position = 0, 115
    halign = center
    valign = center
}

# --- 📅 CALENDAR ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %b")"
    color = rgba(255, 255, 255, 0.6)
    font_size = 13
    font_family = JetBrains Mono Nerd Font
    position = 0, 35
    halign = center
    valign = center
}

# --- 👤 PROFILE IMAGE ---
image {
    monitor =
   
    # =========================================================================================
    # [EN] AUTOMATIC PROFILE PICTURE:
    # Go to the 'Hyprlock-Pfp' folder in your Home directory and place your image there.
    # IMPORTANT: Just rename your file to 'picture.png' (or update below if using .jpg).
    # =========================================================================================
    path = /home/leyzs/.config/Hyprlock-Pfp/picture.jpg
        
    size = 130
    rounding = -1 # [TR] Tam yuvarlak / [EN] Perfect circle
    border_size = 4
    border_color = rgb(0, 0, 0)
    position = 0, 160
    halign = center
    valign = bottom
}

# --- INPUT FIELD ---
input-field {
    monitor =
    size = 210, 40
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.2)
    inner_color = rgba(0, 0, 0, 0.3)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    placeholder_text = <span foreground="##ffffff99">Password...</span>
    hide_input = false
    position = 0, 100
    halign = center
    valign = bottom
}

general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}
